<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Enfermería</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">

  <!-- ═══════════════════════════════════════════════ TOPBAR ═══ -->
  <header id="topbar">
    <div class="topbar-left">
      <div class="logo">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="30" height="30" rx="8" fill="#1E40AF" opacity="0.4"/>
          <path d="M15 5L25 10V16C25 21.523 20.523 27 15 27C9.477 27 5 21.523 5 16V10L15 5Z" stroke="#60A5FA" stroke-width="1.5" fill="rgba(59,130,246,0.15)"/>
          <path d="M15 10v10M10 15h10" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">Sistema de Enfermería</span>
      </div>
      <div class="service-name-wrapper">
        <span id="service-name-display" class="service-name" title="Click para editar" data-action="edit-service-name"></span>
      </div>
    </div>

    <div class="topbar-center">
      <button id="shift-btn" class="shift-toggle" data-action="toggle-shift">
        <span id="shift-icon" class="shift-icon">&#9728;</span>
        <span id="shift-label" class="shift-label-text"></span>
      </button>
    </div>

    <div class="topbar-right">
      <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="&#128269; Buscar paciente, RUT o cama..." class="search-input" autocomplete="off">
      </div>
      <div class="time-display">
        <div id="clock" class="clock">--:--:--</div>
        <div id="date-display" class="date-display">--</div>
      </div>
      <div class="professional-wrapper" title="Click para editar nombre">
        <span class="professional-icon">&#128100;</span>
        <span id="professional-name" class="professional-name" contenteditable="true" spellcheck="false"></span>
      </div>
      <button class="icon-btn no-print" title="Exportar datos JSON" data-action="export-data">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 1v8M5 6l3 3 3-3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/>
        </svg>
      </button>
      <button class="icon-btn no-print" title="Importar datos JSON" data-action="import-data">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 11V3M5 6L8 3l3 3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/>
        </svg>
      </button>
      <button class="icon-btn no-print" title="Imprimir resumen del turno" data-action="print-shift">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="3" y="5" width="10" height="8" rx="1"/>
          <path d="M5 5V3a1 1 0 011-1h4a1 1 0 011 1v2M5 9h6M5 11h4"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ════════════════════════════════════════════ APP LAYOUT ═══ -->
  <div id="app-layout">
    <nav id="sidebar"><!-- rendered by JS --></nav>
    <main id="main-content"><!-- rendered by JS --></main>
  </div>

</div>

<!-- ═══════════════════════════════════════════════ PATIENT MODAL ═══ -->
<div id="modal-overlay" class="modal-overlay hidden" data-action="close-modal-backdrop">
  <div id="modal-container" class="modal-container" onclick="event.stopPropagation()">
    <div id="modal-content"><!-- rendered by JS --></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ DIALOG MODAL ═══ -->
<div id="dialog-overlay" class="modal-overlay dialog-overlay hidden">
  <div class="dialog-container" onclick="event.stopPropagation()">
    <div id="dialog-content"><!-- rendered by JS --></div>
  </div>
</div>

<!-- ═══════════════════════════════════ PRINT TEMPLATE (hidden) ═══ -->
<div id="print-template" style="display:none;"></div>

<!-- Hidden file input for import -->
<input type="file" id="import-file" accept=".json" style="display:none">

<!-- Toast container -->
<div id="toast-container"></div>

<script src="data.js"></script>
<script src="components.js"></script>
<script src="app.js"></script>
</body>
</html>
