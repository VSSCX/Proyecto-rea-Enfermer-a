<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1B3A5C">
  <title>Trazabilidad de Enfermería</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ══════════════════════════════════════════ LOGIN SCREEN -->
<div id="login-screen" class="hidden">
  <!-- renderizado por JS -->
</div>

<!-- ══════════════════════════════════════════ APP PRINCIPAL -->
<div id="app">

  <!-- ═══════════════════════════════════════════ TOPBAR -->
  <header id="topbar">
    <div class="topbar-left">

      <!-- Hamburger (tablet / mobile) -->
      <button id="hamburger-btn" onclick="APP.toggleSidebar()" title="Menú" aria-label="Abrir menú">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round">
          <path d="M2 4h14M2 9h14M2 14h14"/>
        </svg>
      </button>

      <!-- Logo -->
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 30 30" fill="none">
          <rect width="30" height="30" rx="8" fill="#1B3A5C"/>
          <path d="M15 5L25 10V16C25 21.523 20.523 27 15 27C9.477 27 5 21.523 5 16V10L15 5Z"
                stroke="#60A5FA" stroke-width="1.5" fill="rgba(59,130,246,0.15)"/>
          <path d="M15 10v10M10 15h10" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">Trazabilidad de Enfermería</span>
      </div>

      <!-- Zona activa -->
      <span id="service-name-display" class="service-tag" title="Zona activa"></span>
    </div>

    <!-- Botón de turno -->
    <div class="topbar-center">
      <button id="shift-btn" class="shift-toggle" data-action="toggle-shift" title="Cambiar turno">
        <span id="shift-icon">☀</span>
        <span id="shift-label">Turno Día  08:00 – 20:00</span>
      </button>
    </div>

    <!-- Derecha: buscar, reloj, usuario, acciones -->
    <div class="topbar-right">
      <div class="search-wrapper">
        <input type="text" id="search-input"
               placeholder="🔍 Buscar paciente, RUT o cama..."
               class="search-input" autocomplete="off" spellcheck="false">
      </div>

      <div class="clock-wrap">
        <div id="clock" class="clock">--:--:--</div>
        <div id="date-display" class="date-lbl">--</div>
      </div>

      <div class="user-chip" onclick="APP.logout()" title="Cerrar sesión">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"
             stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round">
          <circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6"/>
        </svg>
        <div>
          <div id="user-chip-name" class="user-chip-name">--</div>
          <div id="user-chip-role" class="user-chip-role">--</div>
        </div>
      </div>

      <button class="icon-btn no-print" title="Exportar datos JSON" data-action="export-data">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 1v8M5 6l3 3 3-3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/>
        </svg>
      </button>

      <button class="icon-btn no-print" title="Importar datos JSON" data-action="import-data">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 11V3M5 6L8 3l3 3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/>
        </svg>
      </button>

      <button class="icon-btn no-print" title="Imprimir resumen del turno" data-action="print-shift">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="3" y="5" width="10" height="8" rx="1"/>
          <path d="M5 5V3a1 1 0 011-1h4a1 1 0 011 1v2M5 9h6M5 11h4"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ══════════════════════════════════════════ LAYOUT -->
  <div id="app-layout">
    <nav id="sidebar"><!-- renderizado por JS --></nav>
    <main id="main-content"><!-- renderizado por JS --></main>
  </div>

</div>

<!-- Overlay para cerrar sidebar en mobile -->
<div id="sidebar-overlay"></div>

<!-- ══════════════════════════════════════════ MODAL PACIENTE -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-container" class="modal-container">
    <div id="modal-content"><!-- renderizado por JS --></div>
  </div>
</div>

<!-- ══════════════════════════════════════════ DIALOG GENÉRICO -->
<div id="dialog-overlay" class="modal-overlay dialog-overlay hidden">
  <div class="dialog-container" onclick="event.stopPropagation()">
    <div id="dialog-content"><!-- renderizado por JS --></div>
  </div>
</div>

<!-- Print (oculto) -->
<div id="print-template" style="display:none;"></div>

<!-- Import input -->
<input type="file" id="import-file" accept=".json" style="display:none">

<!-- Toasts -->
<div id="toast-container"></div>

<script src="data.js"></script>
<script src="components.js"></script>
<script src="app.js"></script>
</body>
</html>
