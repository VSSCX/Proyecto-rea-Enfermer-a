<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1B3A5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Trazabilidad de Enfermería</title>
<style>
/* ═══════════════════════════════════════════════════════════
   TRAZABILIDAD DE ENFERMERÍA — v2
   Tema clínico: fondo claro, sidebar oscuro, alta legibilidad
═══════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  /* Navegación */
  --nav-bg:      #1B3A5C;
  --nav-hover:   rgba(255,255,255,0.09);
  --nav-active:  rgba(59,130,246,0.25);
  --nav-accent:  #3B82F6;
  --nav-text:    #C5D5E8;
  --nav-muted:   #7BA0BF;

  /* Página */
  --page-bg:     #EEF2F7;
  --card-bg:     #FFFFFF;
  --card-border: #D1DCE8;
  --card-shadow: 0 1px 3px rgba(27,58,92,0.08), 0 1px 2px rgba(27,58,92,0.04);
  --card-shadow-hover: 0 4px 12px rgba(27,58,92,0.14);
  --card-radius: 10px;

  /* Tipografía */
  --tx-primary:  #0F1923;
  --tx-mid:      #3D5166;
  --tx-muted:    #7B8EA0;
  --tx-white:    #FFFFFF;

  /* Semáforo clínico */
  --g:           #15803D;  --g-bg:  #F0FDF4; --g-bd: #BBF7D0; --g-tx: #14532D;
  --r:           #B91C1C;  --r-bg:  #FFF5F5; --r-bd: #FECACA; --r-tx: #991B1B;
  --a:           #B45309;  --a-bg:  #FFFBEB; --a-bd: #FDE68A; --a-tx: #78350F;
  --b:           #1D6FB8;  --b-bg:  #EFF6FF; --b-bd: #BFDBFE; --b-tx: #1E40AF;
  --gr:          #4B5563;  --gr-bg: #F9FAFB; --gr-bd:#E5E7EB; --gr-tx:#374151;

  /* Layout */
  --topbar-h: 58px;
  --sidebar-w: 242px;
  --font: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

html,body{height:100%;font-family:var(--font);font-size:14px;
  background:var(--page-bg);color:var(--tx-primary);overflow:hidden}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C5D5E8;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#7BA0BF}

/* ─── APP ─── */
#app{height:100vh;display:flex;flex-direction:column}

/* ══════════════════════════════════════════════════ LOGIN SCREEN */
#login-screen{
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(135deg,#1B3A5C 0%,#0F2232 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
#login-screen.hidden{display:none}
.login-card{
  background:#fff;border-radius:16px;padding:40px 36px;
  width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-logo svg{flex-shrink:0}
.login-brand{font-size:17px;font-weight:700;color:#1B3A5C;line-height:1.2}
.login-brand span{font-size:12px;font-weight:400;color:#7B8EA0;display:block}
.login-title{font-size:22px;font-weight:700;color:#0F1923;margin-bottom:6px}
.login-sub{font-size:13px;color:#7B8EA0;margin-bottom:28px}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:12px;font-weight:600;color:#3D5166;
  text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.login-field input,.login-field select{
  width:100%;padding:10px 12px;border:1.5px solid #D1DCE8;border-radius:8px;
  font-size:14px;color:#0F1923;outline:none;background:#fff;font-family:var(--font);
  transition:border-color 0.15s;
}
.login-field input:focus,.login-field select:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,0.12)}
.login-btn{
  width:100%;padding:12px;border-radius:8px;border:none;
  background:#1B3A5C;color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;transition:background 0.15s;margin-top:8px;
  font-family:var(--font);
}
.login-btn:hover{background:#2a4f7a}
.login-footer{text-align:center;font-size:11px;color:#9CA3AF;margin-top:20px}

/* ═══════════════════════════════════════════════════════ TOPBAR */
#topbar{
  height:var(--topbar-h);background:var(--nav-bg);
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;gap:10px;flex-shrink:0;z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0}
.topbar-center{display:flex;align-items:center}
.topbar-right{display:flex;align-items:center;gap:8px}

#hamburger-btn{
  display:none;background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.10);border-radius:7px;
  width:34px;height:34px;align-items:center;justify-content:center;
  cursor:pointer;color:var(--tx-white);flex-shrink:0;
}
#hamburger-btn svg{width:17px;height:17px}

.logo{display:flex;align-items:center;gap:8px}
.logo-text{font-size:14px;font-weight:600;color:#E2EBF4;white-space:nowrap}

.service-tag{
  font-size:11px;color:#7BA0BF;padding:3px 8px;
  background:rgba(255,255,255,0.06);border-radius:6px;
  border:1px solid rgba(255,255,255,0.08);white-space:nowrap;
  max-width:180px;overflow:hidden;text-overflow:ellipsis;cursor:pointer;
}
.service-tag:hover{background:rgba(255,255,255,0.10)}

.shift-toggle{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  border-radius:9px;padding:6px 13px;cursor:pointer;
  color:#E2EBF4;font-size:12px;font-weight:500;transition:all 0.15s;
  white-space:nowrap;
}
.shift-toggle:hover{background:rgba(255,255,255,0.13)}
.shift-toggle.noche{background:rgba(99,102,241,0.2);border-color:rgba(99,102,241,0.35)}

.search-input{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.10);
  border-radius:8px;padding:7px 12px;color:#E2EBF4;font-size:13px;
  width:220px;outline:none;font-family:var(--font);
}
.search-input::placeholder{color:#7BA0BF}
.search-input:focus{border-color:rgba(96,165,250,0.5);background:rgba(255,255,255,0.10)}

.clock-wrap{text-align:right}
.clock{font-size:15px;font-weight:600;color:#E2EBF4;font-variant-numeric:tabular-nums}
.date-lbl{font-size:10px;color:#7BA0BF}

.user-chip{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.10);
  border-radius:8px;padding:4px 10px;cursor:pointer;
}
.user-chip-name{font-size:12px;color:#93C5FD;max-width:120px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-chip-role{font-size:10px;color:#7BA0BF}

.icon-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);
  border-radius:7px;width:32px;height:32px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;color:#94A3B8;transition:all 0.15s;
}
.icon-btn:hover{background:rgba(255,255,255,0.13);color:#E2EBF4}

/* ═══════════════════════════════════════════════════ APP LAYOUT */
#app-layout{display:flex;flex:1;overflow:hidden}

/* ════════════════════════════════════════════════════════ SIDEBAR */
#sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--nav-bg);border-right:1px solid rgba(255,255,255,0.06);
  overflow-y:auto;padding:10px 8px;
  display:flex;flex-direction:column;gap:2px;
}
.s-section{
  font-size:10px;font-weight:600;color:var(--nav-muted);
  letter-spacing:0.08em;text-transform:uppercase;padding:14px 10px 5px;
}
.s-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;
  border-radius:8px;cursor:pointer;font-size:13px;color:var(--nav-text);
  transition:all 0.12s;border:1px solid transparent;user-select:none;
}
.s-item:hover{background:var(--nav-hover);color:#E2EBF4}
.s-item.active{background:var(--nav-active);color:#93C5FD;border-color:rgba(59,130,246,0.2)}
.s-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.s-label{flex:1;white-space:nowrap}
.s-badge{
  font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;
  margin-left:auto;flex-shrink:0;
}
.sb-g{background:var(--g-bg);color:var(--g)}
.sb-r{background:var(--r-bg);color:var(--r)}
.sb-a{background:var(--a-bg);color:var(--a)}
.sb-gr{background:rgba(255,255,255,0.08);color:var(--nav-muted)}
.s-divider{height:1px;background:rgba(255,255,255,0.06);margin:6px 4px}

.zone-select{
  width:100%;padding:7px 10px;background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);border-radius:8px;
  color:#C5D5E8;font-size:12px;outline:none;cursor:pointer;
  font-family:var(--font);margin:4px 0;
}
.zone-select option{background:#1B3A5C;color:#E2EBF4}
.zone-select:focus{border-color:rgba(59,130,246,0.4)}

/* ════════════════════════════════════════════════ MAIN CONTENT */
#main-content{flex:1;overflow-y:auto;padding:18px;background:var(--page-bg)}

/* ════════════════════════════════════════════════ VIEW HEADER */
.view-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.view-title{font-size:18px;font-weight:700;color:var(--tx-primary)}
.view-sub{font-size:12px;color:var(--tx-muted);margin-top:2px}

/* ════════════════════════════════════════════════ SHIFT BANNER */
.shift-banner{
  background:#fff;border:1px solid var(--card-border);border-radius:var(--card-radius);
  padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;
  box-shadow:var(--card-shadow);border-left:3px solid var(--b);
}
.sb-inf{flex:1}
.sb-title{font-size:13px;font-weight:600;color:var(--tx-primary)}
.sb-sub{font-size:11px;color:var(--tx-muted);margin-top:2px}
.sb-stats{display:flex;gap:14px}
.sb-stat{text-align:center}
.sb-val{font-size:16px;font-weight:700}
.sb-lbl{font-size:10px;color:var(--tx-muted)}
.btn-link{font-size:12px;font-weight:500;color:var(--b-tx);background:var(--b-bg);
  border:1px solid var(--b-bd);border-radius:7px;padding:5px 11px;cursor:pointer}
.btn-link:hover{background:#DBEAFE}

/* ════════════════════════════════════════════════════ BED GRID */
.beds-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(178px,1fr));
  gap:12px;
}

/* ════════════════════════════════════════════════════ BED CARD */
.bed-card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:var(--card-radius);box-shadow:var(--card-shadow);
  padding:13px 12px 11px;cursor:pointer;transition:all 0.15s;
  position:relative;overflow:hidden;
}
.bed-card:hover{box-shadow:var(--card-shadow-hover);transform:translateY(-1px)}
.bed-card.st-libre{opacity:0.6;border-style:dashed}
.bed-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.bed-card.st-ok::before{background:var(--g)}
.bed-card.st-alerta::before{background:var(--r)}
.bed-card.st-obs::before{background:var(--a)}
.bed-card.st-libre::before{background:var(--gr-bd)}

.bed-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.bed-num{font-size:18px;font-weight:700;color:var(--tx-primary)}
.bed-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px}
.st-ok    .bed-badge{background:var(--g-bg);color:var(--g)}
.st-alerta .bed-badge{background:var(--r-bg);color:var(--r)}
.st-obs   .bed-badge{background:var(--a-bg);color:var(--a)}
.st-libre .bed-badge{background:var(--gr-bg);color:var(--gr)}

.bed-name{font-size:13px;font-weight:500;color:var(--tx-primary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bed-dx{font-size:11px;color:var(--tx-mid);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.bed-divider{height:1px;background:var(--card-border);margin:8px 0}

.bed-timer{
  display:flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;color:var(--tx-mid);
}
.t-warn{color:var(--a)} .t-danger{color:var(--r)}
.bed-ing{font-size:10px;color:var(--tx-muted);margin-top:2px}

.bed-tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.bed-tag{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:500}
.tag-pend{background:var(--a-bg);color:var(--a)}
.tag-evol{background:var(--g-bg);color:var(--g)}
.tag-crit{background:var(--r-bg);color:var(--r)}
.tag-alergia{background:#FDF4FF;color:#7E22CE;border:1px solid #E9D5FF}

.alerta-pulse{
  position:absolute;top:10px;right:10px;
  width:8px;height:8px;border-radius:50%;background:var(--r);
  animation:pulse-r 1.4s ease-in-out infinite;
}
@keyframes pulse-r{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}

/* ═══════════════════════════════════════════════════════ MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(11,22,35,0.6);
  z-index:200;display:flex;align-items:flex-start;justify-content:flex-end;
  padding:10px;
}
.modal-overlay.hidden{display:none}
.dialog-overlay{align-items:center;justify-content:center}

.modal-container{
  background:var(--card-bg);border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  width:760px;max-width:calc(100vw - 20px);
  height:calc(100vh - 20px);display:flex;flex-direction:column;overflow:hidden;
  border:1px solid var(--card-border);
}

.modal-hdr{
  padding:14px 18px;border-bottom:1px solid var(--card-border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  background:var(--card-bg);
}
.modal-hdr-main{flex:1;min-width:0}
.modal-htitle{font-size:16px;font-weight:700;color:var(--tx-primary)}
.modal-hsub{font-size:12px;color:var(--tx-muted);margin-top:2px}
.modal-close{
  width:30px;height:30px;border-radius:7px;border:1px solid var(--card-border);
  background:var(--gr-bg);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:15px;color:var(--tx-mid);flex-shrink:0;
}
.modal-close:hover{background:var(--r-bg);color:var(--r)}

.modal-tabs{
  display:flex;border-bottom:1px solid var(--card-border);
  padding:0 18px;flex-shrink:0;overflow-x:auto;background:var(--gr-bg);
}
.modal-tab{
  padding:9px 13px;font-size:12px;cursor:pointer;color:var(--tx-muted);
  border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.12s;
  font-weight:500;
}
.modal-tab:hover{color:var(--tx-primary)}
.modal-tab.active{color:var(--b-tx);border-bottom-color:var(--b);background:var(--card-bg)}

.modal-body{flex:1;overflow-y:auto;padding:18px}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ═══════════════════════════════════════════════════════ FORMS */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg.c3{grid-template-columns:1fr 1fr 1fr}
.fg.c1{grid-template-columns:1fr}
.fl label{
  display:block;font-size:11px;font-weight:600;color:var(--tx-mid);
  text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;
}
.fl input,.fl select,.fl textarea{
  width:100%;padding:8px 10px;border:1.5px solid var(--card-border);
  border-radius:7px;font-size:13px;color:var(--tx-primary);
  background:#fff;outline:none;font-family:var(--font);transition:border-color 0.15s;
}
.fl input:focus,.fl select:focus,.fl textarea:focus{
  border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,0.10);
}
.fl textarea{min-height:78px;resize:vertical}
.fl.alergia input{border-color:var(--r-bd);background:var(--r-bg);color:var(--r-tx)}
.fl-val{font-size:13px;color:var(--tx-primary);padding:8px 0}

.sec-hdr{
  font-size:11px;font-weight:700;color:var(--tx-muted);text-transform:uppercase;
  letter-spacing:0.06em;padding-bottom:8px;border-bottom:1px solid var(--card-border);
  margin-bottom:12px;margin-top:18px;
}
.sec-hdr:first-child{margin-top:0}
.sec-row{display:flex;justify-content:space-between;align-items:center;
  padding-bottom:8px;border-bottom:1px solid var(--card-border);margin-bottom:12px;margin-top:18px}
.sec-row:first-child{margin-top:0}
.sec-row .sec-title{font-size:11px;font-weight:700;color:var(--tx-muted);
  text-transform:uppercase;letter-spacing:0.06em;border:none;padding:0;margin:0}

/* ═══════════════════════════════════════════════════ EVOLUCIONES */
.evol-list{display:flex;flex-direction:column;gap:9px}
.evol-item{
  background:#F8FAFC;border:1px solid var(--card-border);border-radius:9px;
  padding:11px 13px;position:relative;
}
.evol-item.t-dia{border-left:3px solid var(--a)}
.evol-item.t-noche{border-left:3px solid #6366F1}
.evol-meta{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.evol-date{font-size:11px;font-weight:600;color:var(--tx-mid)}
.evol-turno-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500}
.tb-dia{background:var(--a-bg);color:var(--a-tx)}
.tb-noche{background:#EEF2FF;color:#3730A3}
.evol-autor-badge{font-size:10px;padding:2px 7px;background:var(--b-bg);
  color:var(--b-tx);border-radius:99px;margin-left:auto}
.evol-text{font-size:13px;color:var(--tx-primary);line-height:1.6;white-space:pre-wrap}
.evol-del{
  position:absolute;top:9px;right:9px;font-size:11px;color:var(--r);
  cursor:pointer;opacity:0;background:var(--r-bg);padding:2px 6px;border-radius:5px;
}
.evol-item:hover .evol-del{opacity:1}

.evol-form{
  background:var(--b-bg);border:1.5px solid var(--b-bd);border-radius:10px;
  padding:14px;margin-top:12px;
}
.evol-form-hdr{font-size:12px;font-weight:600;color:var(--b-tx);margin-bottom:10px}
.fmt-toggle{display:flex;gap:6px;margin-bottom:10px}
.fmt-btn{
  font-size:11px;padding:4px 11px;border-radius:99px;
  border:1px solid var(--b-bd);background:#fff;cursor:pointer;color:var(--b-tx);
  font-family:var(--font);transition:all 0.12s;
}
.fmt-btn.active{background:var(--b-tx);color:#fff;border-color:var(--b-tx)}

/* ═══════════════════════════════════════════════════ EXÁMENES */
.exam-table{width:100%;border-collapse:collapse}
.exam-table th{
  font-size:11px;font-weight:600;color:var(--tx-muted);text-transform:uppercase;
  letter-spacing:0.05em;padding:8px 10px;text-align:left;
  border-bottom:1px solid var(--card-border);background:var(--gr-bg);
}
.exam-table td{
  font-size:13px;padding:9px 10px;border-bottom:1px solid #F1F5F9;color:var(--tx-primary);
}
.exam-table tr:last-child td{border-bottom:none}
.exam-crit{color:var(--r);font-weight:600}
.ex-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500}
.eb-pend{background:var(--a-bg);color:var(--a-tx)}
.eb-res{background:var(--g-bg);color:var(--g-tx)}
.eb-crit{background:var(--r-bg);color:var(--r-tx)}

/* ═══════════════════════════════════════════════════ PROCEDIMIENTOS */
.proc-list{display:flex;flex-direction:column;gap:7px}
.proc-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:#F8FAFC;border:1px solid var(--card-border);border-radius:8px;
  transition:background 0.12s;
}
.proc-item.done{background:var(--g-bg);border-color:var(--g-bd)}
.proc-item.done .proc-name{text-decoration:line-through;color:var(--tx-muted)}
.proc-chk{width:18px;height:18px;cursor:pointer;flex-shrink:0;accent-color:var(--g)}
.proc-name{flex:1;font-size:13px;color:var(--tx-primary)}
.proc-meta{font-size:11px;color:var(--tx-muted);text-align:right;line-height:1.5}
.proc-del{font-size:11px;color:var(--r);cursor:pointer;opacity:0;
  padding:2px 6px;background:var(--r-bg);border-radius:5px}
.proc-item:hover .proc-del{opacity:1}

/* ═══════════════════════════════════════════════════ PENDIENTES */
.pend-list{display:flex;flex-direction:column;gap:7px}
.pend-item{
  display:flex;align-items:flex-start;gap:9px;padding:10px 12px;
  background:var(--a-bg);border:1px solid var(--a-bd);border-radius:8px;
}
.pend-dot{width:7px;height:7px;border-radius:50%;background:var(--a);
  flex-shrink:0;margin-top:4px}
.pend-text{flex:1;font-size:13px;color:var(--a-tx)}
.pend-del{font-size:11px;color:var(--r);cursor:pointer;opacity:0;
  padding:2px 6px;background:var(--r-bg);border-radius:5px}
.pend-item:hover .pend-del{opacity:1}

/* ═══════════════════════════════════════════════════ BUTTONS */
.btn-add{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;padding:6px 12px;border-radius:7px;
  border:1.5px dashed var(--card-border);background:transparent;
  color:var(--tx-muted);cursor:pointer;transition:all 0.12s;font-family:var(--font);
}
.btn-add:hover{border-color:var(--b);color:var(--b-tx);background:var(--b-bg)}
.btn-pri{
  display:inline-flex;align-items:center;gap:5px;
  font-size:13px;padding:8px 16px;border-radius:7px;border:none;
  background:#1B3A5C;color:#fff;cursor:pointer;font-weight:500;
  transition:all 0.12s;font-family:var(--font);
}
.btn-pri:hover{background:#2a4f7a}
.btn-sec{background:#F1F5F9;color:var(--tx-mid);border:1px solid var(--card-border);font-family:var(--font)}
.btn-sec:hover{background:#E2E8F0}
.btn-danger{background:var(--r);color:#fff;border:none}
.btn-danger:hover{background:#991B1B}
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

/* ════════════════════════════════════════════════ HISTORIAL */
.hist-list{display:flex;flex-direction:column;gap:11px}
.hist-card{
  background:var(--card-bg);border-radius:var(--card-radius);
  border:1px solid var(--card-border);box-shadow:var(--card-shadow);overflow:hidden;
}
.hist-hdr{
  display:flex;align-items:center;gap:10px;padding:13px 16px;
  cursor:pointer;transition:background 0.12s;
}
.hist-hdr:hover{background:#F8FAFC}
.hist-hdr.open{border-bottom:1px solid var(--card-border)}
.hist-icon{font-size:20px}
.hist-info{flex:1}
.hist-title{font-size:13px;font-weight:600;color:var(--tx-primary)}
.hist-sub{font-size:11px;color:var(--tx-muted);margin-top:1px}
.hist-stats{display:flex;gap:7px;flex-wrap:wrap}
.hist-stat{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600}
.hist-body{padding:14px;display:none}
.hist-body.show{display:block}
.hist-chevron{font-size:16px;color:var(--tx-muted);transition:transform 0.2s}
.hist-hdr.open .hist-chevron{transform:rotate(90deg)}

.snap-card{
  border:1px solid var(--card-border);border-radius:8px;
  padding:11px 13px;margin-bottom:9px;background:#FAFCFF;
}
.snap-hdr{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.snap-cama{font-size:14px;font-weight:700;color:var(--tx-primary)}
.snap-name{font-size:13px;color:var(--tx-mid)}
.snap-estado{
  margin-left:auto;font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:99px;
}
.snap-dx{font-size:11px;color:var(--tx-muted)}
.snap-sec{font-size:11px;font-weight:600;color:var(--tx-muted);
  margin-top:9px;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em}
.snap-txt{font-size:12px;color:var(--tx-primary);line-height:1.5}
.snap-line{font-size:12px;padding:3px 0;color:var(--tx-mid)}
.snap-line.done{color:var(--g)}
.snap-line.pend{color:var(--a)}
.snap-line.crit{color:var(--r);font-weight:600}

/* ════════════════════════════════════════════ GLOBAL VIEWS */
.gpend-card{
  background:var(--card-bg);border-radius:var(--card-radius);
  border:1px solid var(--card-border);box-shadow:var(--card-shadow);
  padding:14px;margin-bottom:12px;
}
.gpend-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.gpend-cama{font-size:15px;font-weight:700;color:var(--tx-primary)}
.gpend-name{font-size:13px;color:var(--tx-mid)}
.gpend-dx{font-size:11px;color:var(--tx-muted);margin-left:auto;
  max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ══════════════════════════════════════════════════════ DIALOG */
.dialog-container{
  background:#fff;border-radius:12px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
  width:400px;max-width:calc(100vw - 32px);padding:24px;
  border:1px solid var(--card-border);
}
.dialog-title{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--tx-primary)}
.dialog-msg{font-size:13px;color:var(--tx-mid);line-height:1.6;margin-bottom:18px}
.dialog-input{
  width:100%;padding:9px 11px;border:1.5px solid var(--card-border);
  border-radius:7px;font-size:13px;outline:none;margin-bottom:12px;
  font-family:var(--font);
}
.dialog-input:focus{border-color:#3B82F6}
.dialog-actions{display:flex;gap:8px;justify-content:flex-end}

/* ══════════════════════════════════════════════════════ TOAST */
#toast-container{position:fixed;bottom:18px;right:18px;z-index:999;
  display:flex;flex-direction:column;gap:7px}
.toast{
  background:#1B3A5C;color:#E2EBF4;border-radius:9px;padding:10px 15px;
  font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,0.25);
  border-left:3px solid var(--g);min-width:210px;max-width:300px;
  animation:slideIn 0.25s ease;
}
.toast.error{border-left-color:var(--r);background:#7f1d1d;color:#fee2e2}
.toast.warn{border-left-color:var(--a);background:#451a03;color:#fef3c7}
@keyframes slideIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}

/* ══════════════════════════════════════════════════ EMPTY STATE */
.empty-st{text-align:center;padding:32px 20px;color:var(--tx-muted)}
.empty-st .ei{font-size:30px;margin-bottom:8px}
.empty-st p{font-size:13px}

/* ══════════════════════════════════════════════════════ PRINT */
@media print{
  body{background:#fff;color:#000;font-size:11px}
  #login-screen,#topbar,#sidebar,#modal-overlay,#dialog-overlay,
  #toast-container,#sidebar-overlay,.no-print{display:none!important}
  #app-layout{display:block}
  #main-content{padding:0;overflow:visible}
  .beds-grid{grid-template-columns:repeat(4,1fr);gap:8px}
  .bed-card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid}
}

/* ══════════════════════════════════════════════════ RESPONSIVE */
#sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.45);z-index:150;
}
#sidebar-overlay.vis{display:block}

/* ── TABLET 640–1100px ── */
@media(max-width:1100px){
  #hamburger-btn{display:flex}
  #sidebar{
    position:fixed;top:var(--topbar-h);left:0;
    height:calc(100vh - var(--topbar-h));
    z-index:160;transform:translateX(-100%);
    transition:transform 0.24s ease;width:var(--sidebar-w);
    box-shadow:4px 0 20px rgba(0,0,0,0.3);
  }
  #sidebar.open{transform:translateX(0)}
  .search-input{width:170px}
}

/* ── MOBILE < 640px ── */
@media(max-width:640px){
  :root{--topbar-h:54px}
  #topbar{padding:0 10px;gap:7px}
  .logo-text{display:none}
  .service-tag{display:none}
  #shift-label{font-size:11px}
  .search-input{display:none}
  .clock{font-size:13px}
  .date-lbl{display:none}
  .user-chip-role{display:none}
  .user-chip-name{max-width:80px}
  .icon-btn[title="Importar datos JSON"]{display:none}
  #main-content{padding:10px}
  .beds-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .bed-card{padding:10px 9px 9px}
  .bed-num{font-size:16px}
  .bed-name{font-size:12px}
  .bed-dx{font-size:10px}
  .bed-timer{font-size:11px}
  .bed-ing{font-size:9px}
  .shift-banner{flex-wrap:wrap;gap:8px}
  .sb-stats{gap:10px}
  .modal-overlay{padding:0;align-items:flex-end;justify-content:center}
  .modal-container{width:100vw;height:96vh;border-radius:14px 14px 0 0;border-bottom:none}
  .fg,.fg.c3{grid-template-columns:1fr}
  .view-title{font-size:16px}
  .hist-stats{display:none}
  .dialog-container{width:calc(100vw - 24px)}
  .gpend-dx{display:none}
}

@media(max-width:380px){
  .beds-grid{grid-template-columns:1fr}
  .sb-stats{display:none}
}

/* Touch targets */
@media(hover:none)and(pointer:coarse){
  .s-item{padding:11px 10px}
  .modal-tab{padding:11px 13px}
  .btn-pri,.btn-add{padding:11px 16px}
  .proc-chk{width:22px;height:22px}
}
</style>
</head>
<body>
<div id="login-screen" class="hidden"></div>
<div id="app">
  <header id="topbar">
    <div class="topbar-left">
      <button id="hamburger-btn" onclick="APP.toggleSidebar()" title="Menú" aria-label="Abrir menú">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 4h14M2 9h14M2 14h14"/></svg>
      </button>
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 30 30" fill="none">
          <rect width="30" height="30" rx="8" fill="#1B3A5C"/>
          <path d="M15 5L25 10V16C25 21.523 20.523 27 15 27C9.477 27 5 21.523 5 16V10L15 5Z" stroke="#60A5FA" stroke-width="1.5" fill="rgba(59,130,246,0.15)"/>
          <path d="M15 10v10M10 15h10" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">Trazabilidad de Enfermería</span>
      </div>
      <span id="service-name-display" class="service-tag"></span>
    </div>
    <div class="topbar-center">
      <button id="shift-btn" class="shift-toggle" data-action="toggle-shift">
        <span id="shift-icon">☀</span>
        <span id="shift-label">Turno Día 08:00–20:00</span>
      </button>
    </div>
    <div class="topbar-right">
      <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="🔍 Buscar paciente, RUT o cama..." class="search-input" autocomplete="off">
      </div>
      <div class="clock-wrap">
        <div id="clock" class="clock">--:--:--</div>
        <div id="date-display" class="date-lbl">--</div>
      </div>
      <div class="user-chip" onclick="APP.logout()" title="Cerrar sesión">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6"/></svg>
        <div>
          <div id="user-chip-name" class="user-chip-name">--</div>
          <div id="user-chip-role" class="user-chip-role">--</div>
        </div>
      </div>
      <button class="icon-btn no-print" title="Exportar datos JSON" data-action="export-data">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1v8M5 6l3 3 3-3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg>
      </button>
      <button class="icon-btn no-print" title="Importar datos JSON" data-action="import-data">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 11V3M5 6L8 3l3 3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg>
      </button>
      <button class="icon-btn no-print" title="Imprimir resumen" data-action="print-shift">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="5" width="10" height="8" rx="1"/><path d="M5 5V3a1 1 0 011-1h4a1 1 0 011 1v2M5 9h6M5 11h4"/></svg>
      </button>
    </div>
  </header>
  <div id="app-layout">
    <nav id="sidebar"></nav>
    <main id="main-content"></main>
  </div>
</div>
<div id="sidebar-overlay"></div>
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-container" class="modal-container"><div id="modal-content"></div></div>
</div>
<div id="dialog-overlay" class="modal-overlay dialog-overlay hidden">
  <div class="dialog-container" onclick="event.stopPropagation()"><div id="dialog-content"></div></div>
</div>
<div id="print-template" style="display:none;"></div>
<input type="file" id="import-file" accept=".json" style="display:none">
<div id="toast-container"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   TRAZABILIDAD DE ENFERMERÍA — data.js v2
═══════════════════════════════════════════════════════════ */

const KEYS = { PATIENTS:'enf_v2_patients', HISTORY:'enf_v2_history', CONFIG:'enf_v2_config' };

/* ─── ZONAS DEL HOSPITAL ─── */
const HOSPITAL_ZONES = [
  { id:'all',        name:'Todas las zonas',              camas:[] },
  { id:'med-int-3',  name:'Medicina Interna — Piso 3',    camas:['101','102','103','104','105','106','107','108'] },
  { id:'cirugia-4',  name:'Cirugía General — Piso 4',     camas:['201','202','203','204','205','206'] },
  { id:'traumato-2', name:'Traumatología — Piso 2',       camas:['301','302','303','304','305'] },
  { id:'uci-5',      name:'UCI — Piso 5',                 camas:['501','502','503','504','505','506'] },
  { id:'pediatria-1',name:'Pediatría — Piso 1',           camas:['101P','102P','103P','104P','105P'] },
];

/* ─── ROLES ─── */
const ROLES = ['EU Jefe de Turno','Enfermero/a Universitario','TENS','Médico Tratante','Residente'];

/* ─── TURNOS: 08:00–20:00 y 20:00–08:00 ─── */
function detectShift() {
  const h = new Date().getHours();
  return (h >= 8 && h < 20) ? 'DIA' : 'NOCHE';
}
function shiftLabel(type) {
  return type === 'DIA' ? '☀ Turno Día  08:00 – 20:00' : '🌙 Turno Noche  20:00 – 08:00';
}

/* ─── STORAGE ─── */
function sGet(key, fb=null){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):fb; }catch{ return fb; } }
function sSet(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); return true; }catch{ return false; } }

/* ─── UID ─── */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* ─── DATE HELPERS ─── */
function fmtDate(d){
  if(!d)return'--';
  const dt=d instanceof Date?d:new Date(d);
  if(isNaN(dt))return'--';
  return dt.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtTime(d){
  if(!d)return'--';
  const dt=d instanceof Date?d:new Date(d);
  if(isNaN(dt))return'--';
  return dt.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
}
function fmtDT(d){ if(!d)return'--'; return fmtDate(d)+' '+fmtTime(d); }
function isToday(iso){ try{ return new Date(iso).toDateString()===new Date().toDateString(); }catch{ return false; } }
function daysAgo(d,h=8){ const dt=new Date(); dt.setDate(dt.getDate()-d); dt.setHours(h,0,0,0); return dt.toISOString(); }
function calcElapsed(iso){
  if(!iso)return null;
  const ms=Date.now()-new Date(iso).getTime();
  if(ms<0)return'0m';
  const m=Math.floor(ms/60000)%60, h=Math.floor(ms/3600000)%24, d=Math.floor(ms/86400000);
  if(d>0)return`${d}d ${h}h ${m}m`;
  if(h>0)return`${h}h ${m}m`;
  return`${m}m`;
}
function calcDays(iso){ if(!iso)return null; return Math.floor((Date.now()-new Date(iso).getTime())/86400000); }

/* ─── CONFIG ─── */
const DEFAULT_CFG = { currentShift:'DIA', shiftStart:'08:00', zoneId:'all' };
function getCfg(){ return{ ...DEFAULT_CFG, ...sGet(KEYS.CONFIG,{}) }; }
function saveCfg(c){ sSet(KEYS.CONFIG,c); }

/* ─── SESSION USER (sessionStorage para login por turno) ─── */
function getUser(){ try{ const u=sessionStorage.getItem('enf_user'); return u?JSON.parse(u):null; }catch{ return null; } }
function setUser(u){ try{ sessionStorage.setItem('enf_user',JSON.stringify(u)); }catch{} }
function clearUser(){ try{ sessionStorage.removeItem('enf_user'); }catch{} }

/* ─── PATIENTS ─── */
function getPatients(){ return sGet(KEYS.PATIENTS, SAMPLE_PATIENTS); }
function savePatients(p){ sSet(KEYS.PATIENTS,p); }
function getPatientByCama(cama){ return getPatients().find(p=>p.cama===cama)||null; }
function updatePatient(updated){
  const pts=getPatients();
  const i=pts.findIndex(p=>p.cama===updated.cama);
  if(i!==-1) pts[i]=updated; else pts.push(updated);
  savePatients(pts);
}
function emptyPatient(cama){
  return { cama, nombre:'', rut:'', edad:null, fechaNac:'', dx:'', servicio:'',
    medico:'', prevision:'FONASA', estado:'libre', ingreso_datetime:null,
    motivo:'', antecedentes:'', alergias:'', medicacion_previa:'',
    evoluciones:[], examenes:[], procedimientos:[], pendientes:[] };
}

/* ─── HISTORY ─── */
function getHistory(){ return sGet(KEYS.HISTORY,[]); }
function saveHistory(h){ const MAX=90; sSet(KEYS.HISTORY,h.slice(0,MAX)); }
function addHistory(entry){ const h=getHistory(); h.unshift(entry); saveHistory(h); }

/* ─── SNAPSHOT de cierre de turno ─── */
function buildSnapshot(user, shiftType, shiftStart, obsGen, incidente){
  const pts=getPatients().filter(p=>p.estado!=='libre');
  const now=new Date();
  return {
    id: uid(),
    tipo: shiftType,
    fecha: fmtDate(now),
    timestamp: now.toISOString(),
    hora_inicio: shiftStart||'--:--',
    hora_cierre: fmtTime(now),
    profesional: user.name,
    rol: user.role,
    zona: user.zone||'all',
    obs_generales: obsGen||'',
    incidente: incidente||'',
    pacientes: pts.map(p=>({
      cama: p.cama,
      nombre: p.nombre,
      dx: p.dx,
      estado: p.estado,
      dias: calcDays(p.ingreso_datetime),
      ingreso: fmtDT(p.ingreso_datetime),
      alergias: p.alergias||'',
      evoluciones_turno: (p.evoluciones||[]).filter(e=>e.turno===shiftType&&isToday(e.fechaRaw)),
      procs_realizados: (p.procedimientos||[]).filter(x=>x.done),
      procs_pendientes: (p.procedimientos||[]).filter(x=>!x.done),
      examenes_criticos: (p.examenes||[]).filter(e=>e.estado==='critico'),
      otros_pendientes: p.pendientes||[],
    }))
  };
}

/* ─── SNAPSHOT del estado actual (para historial) ─── */
function buildCurrentSnapshot(){
  const user=getUser()||{name:'Sistema',role:'Auto'};
  const cfg=getCfg();
  const pts=getPatients().filter(p=>p.estado!=='libre');
  const now=new Date();
  return {
    id: uid(),
    tipo: cfg.currentShift,
    fecha: fmtDate(now),
    timestamp: now.toISOString(),
    hora_inicio: cfg.shiftStart||'--:--',
    hora_cierre: fmtTime(now),
    profesional: user.name,
    rol: user.role,
    zona: cfg.zoneId||'all',
    obs_generales: 'Registro automático del estado actual (turno en curso)',
    incidente: '',
    esActual: true,
    pacientes: pts.map(p=>({
      cama: p.cama, nombre:p.nombre, dx:p.dx, estado:p.estado,
      dias:calcDays(p.ingreso_datetime), ingreso:fmtDT(p.ingreso_datetime),
      alergias:p.alergias||'',
      evoluciones_turno:(p.evoluciones||[]).filter(e=>isToday(e.fechaRaw)),
      procs_realizados:(p.procedimientos||[]).filter(x=>x.done),
      procs_pendientes:(p.procedimientos||[]).filter(x=>!x.done),
      examenes_criticos:(p.examenes||[]).filter(e=>e.estado==='critico'),
      otros_pendientes:p.pendientes||[],
    }))
  };
}

/* ════════════════════════════════════════════════ DATOS DE EJEMPLO */
const SAMPLE_PATIENTS = [
  {
    cama:'101', nombre:'María González Pérez', rut:'12.345.678-9', edad:67,
    fechaNac:'15/03/1957', dx:'Neumonía adquirida en comunidad', servicio:'Medicina Interna',
    medico:'Dr. Rodrigo Saavedra', prevision:'FONASA', estado:'alerta',
    ingreso_datetime:daysAgo(6,20),
    motivo:'Fiebre alta 39.5°C, disnea progresiva, desaturación SpO₂ 85% basal.',
    antecedentes:'DM2, HTA, EPOC leve. No fuma hace 5 años.',
    alergias:'Penicilina (rash cutáneo)', medicacion_previa:'Metformina 850mg c/12h, Losartán 50mg',

/* ══════════════════════════════════════════ SHIFT BANNER */
function renderShiftBanner(){
  const hist=getHistory().filter(h=>!h.esActual);
  if(!hist.length)return'';
  const last=hist[0];
  const pend=last.pacientes.reduce((a,p)=>a+(p.procs_pendientes||[]).length,0);
  const alertas=last.pacientes.filter(p=>p.estado==='alerta').length;
  const icon=last.tipo==='DIA'?'☀':'🌙';
  return`<div class="shift-banner">
    <div class="shift-banner-icon">${icon}</div>
    <div class="sb-inf">
      <div class="sb-title">Turno anterior: ${last.tipo==='DIA'?'Día':'Noche'} — ${last.fecha} — ${last.profesional}</div>
      <div class="sb-sub">Cierre: ${last.hora_inicio} a ${last.hora_cierre} · ${last.pacientes.length} pacientes</div>
    </div>
    <div class="sb-stats">
      <div class="sb-stat"><div class="sb-val" style="color:var(--r)">${alertas}</div><div class="sb-lbl">Alertas</div></div>
      <div class="sb-stat"><div class="sb-val" style="color:var(--a)">${pend}</div><div class="sb-lbl">Pend.</div></div>
      <div class="sb-stat"><div class="sb-val" style="color:var(--g)">${last.pacientes.length}</div><div class="sb-lbl">Pacientes</div></div>
    </div>
    <button class="btn-link no-print" onclick="APP.viewLastShift()">Ver detalle</button>
  </div>`;
}

/* ══════════════════════════════════════════════ BED CARD */
function renderBedCard(p){
  const SL={ok:'Estable',alerta:'Alerta',obs:'Observación',libre:'Disponible'};
  if(p.estado==='libre') return`
    <div class="bed-card st-libre" onclick="APP.openPatient('${p.cama}')">
      <div class="bed-hdr"><div class="bed-num">Cama ${p.cama}</div><span class="bed-badge">Disponible</span></div>
      <div class="bed-name" style="color:#94A3B8">Sin paciente asignado</div>
      <div class="bed-divider"></div>
      <div style="font-size:12px;color:#CBD5E1;text-align:center;padding:4px 0">+ Asignar paciente</div>
    </div>`;

  const elapsed=calcElapsed(p.ingreso_datetime);
  const days=p.ingreso_datetime?Math.floor((Date.now()-new Date(p.ingreso_datetime))/86400000):0;
  const tCls=days>=14?'t-danger':days>=7?'t-warn':'';
  const pend=(p.procedimientos||[]).filter(x=>!x.done).length;
  const crit=(p.examenes||[]).some(e=>e.estado==='critico');
  const evolHoy=(p.evoluciones||[]).some(e=>isToday(e.fechaRaw));
  return`
    <div class="bed-card st-${p.estado}" onclick="APP.openPatient('${p.cama}')">
      ${p.estado==='alerta'?`<div class="alerta-pulse"></div>`:''}
      <div class="bed-hdr"><div class="bed-num">Cama ${p.cama}</div><span class="bed-badge">${SL[p.estado]}</span></div>
      <div class="bed-name">${p.nombre}</div>
      <div class="bed-dx">${p.dx}</div>
      <div class="bed-divider"></div>
      <div class="bed-timer ${tCls}"><span>⏱</span><span class="timer-val" data-iso="${p.ingreso_datetime||''}">${elapsed||'--'}</span></div>
      <div class="bed-ing">Ingreso: ${p.ingreso_datetime?fmtDT(new Date(p.ingreso_datetime)):'--'}</div>
      <div class="bed-tags">
        ${pend?`<span class="bed-tag tag-pend">⚑ ${pend} pend.</span>`:''}
        ${evolHoy?`<span class="bed-tag tag-evol">✓ Evolución</span>`:''}
        ${crit?`<span class="bed-tag tag-crit">⚠ Crítico</span>`:''}
        ${p.alergias?`<span class="bed-tag tag-alergia">Alergia</span>`:''}
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════════ VIEWS */
function renderBedsView(filter, zoneId){
  const cfg=getCfg();
  let pts=getPatients();
  const zone=HOSPITAL_ZONES.find(z=>z.id===(zoneId||cfg.zoneId||'all'));
  if(zone&&zone.camas.length) pts=pts.filter(p=>zone.camas.includes(p.cama));

  // Filtros corregidos
  if(filter==='pendientes'){
    pts=pts.filter(p=> p.estado!=='libre' && (
      (p.procedimientos||[]).some(x=>!x.done) ||
      (p.pendientes||[]).length>0
    ));
  } else if(filter==='alertas'){
    pts=pts.filter(p=>p.estado==='alerta');
  } else if(filter==='criticos'){
    pts=pts.filter(p=>p.estado!=='libre'&&(p.examenes||[]).some(e=>e.estado==='critico'));
  }
  const activos=pts.filter(p=>p.estado!=='libre').length;
  return`
    <div class="view-hdr">
      <div><div class="view-title">Vista de camas</div>
      <div class="view-sub">${zone?zone.name:'Todas las zonas'} — ${activos} paciente${activos!==1?'s':''} activo${activos!==1?'s':''}</div></div>
    </div>
    ${renderShiftBanner()}
    ${pts.length?`<div class="beds-grid">${pts.map(renderBedCard).join('')}</div>`:
      `<div class="empty-st"><div class="ei">🏥</div><p>Sin pacientes que coincidan con el filtro seleccionado</p></div>`}`;
}

function renderEvolucionesView(){
  const cfg=getCfg();
  const user=getUser();
  const todos=getPatients().filter(p=>p.estado!=='libre');
  const conEvol=todos.filter(p=>(p.evoluciones||[]).some(e=>isToday(e.fechaRaw)));
  const sinEvol=todos.filter(p=>!(p.evoluciones||[]).some(e=>isToday(e.fechaRaw)));
  return`
    <div class="view-hdr">
      <div><div class="view-title">Evoluciones del turno</div>
      <div class="view-sub">Turno ${cfg.currentShift==='DIA'?'Día 08:00-20:00':'Noche 20:00-08:00'} · ${user?user.name:'--'}</div></div>
    </div>
    ${sinEvol.length?`<div style="background:var(--a-bg);border:1px solid var(--a-bd);border-radius:9px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--a-tx)">
      ⚠ Sin evolución hoy: ${sinEvol.map(p=>`Cama ${p.cama} (${p.nombre.split(' ')[0]})`).join(' · ')}
    </div>`:''}
    ${conEvol.length?conEvol.map(p=>{
      const hoy=(p.evoluciones||[]).filter(e=>isToday(e.fechaRaw));
      return`<div class="gpend-card" style="margin-bottom:12px">
        <div class="gpend-hdr"><span class="gpend-cama">Cama ${p.cama}</span><span class="gpend-name">${p.nombre}</span><span class="gpend-dx">${p.dx}</span></div>
        <div class="evol-list">${hoy.map(e=>renderEvolItem(e,p.cama)).join('')}</div>
      </div>`;
    }).join(''):`<div class="empty-st"><div class="ei">✎</div><p>Sin evoluciones registradas hoy</p></div>`}`;
}

function renderEvolItem(e,cama){
  const tc=e.turno==='DIA'?'t-dia':'t-noche';
  return`<div class="evol-item ${tc}">
    <div class="evol-meta">
      <span class="evol-date">${e.fecha}</span>
      <span class="evol-turno-badge ${e.turno==='DIA'?'tb-dia':'tb-noche'}">${e.turno==='DIA'?'☀ Día':'🌙 Noche'}</span>
      <span class="evol-autor-badge">${e.autor}</span>
      <span class="evol-del" onclick="APP.delEvol('${cama}','${e.id}')">Eliminar</span>

}

/* ══════════════════════════════════════════════ HISTORIAL */
function renderHistoricoView(filterCama){
  // Incluir estado actual como primer ítem
  const realHist=getHistory().filter(h=>!h.esActual);
  const currentSnap=buildCurrentSnapshot();
  const allEntries=[currentSnap,...realHist];
  const pts=getPatients().filter(p=>p.estado!=='libre');

  return`
    <div class="view-hdr">
      <div><div class="view-title">Vista histórica de turnos</div>
      <div class="view-sub">Trazabilidad completa · ${allEntries.length} registro${allEntries.length!==1?'s':''}</div></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
      <select style="padding:7px 10px;border:1.5px solid var(--card-border);border-radius:7px;font-size:13px;background:#fff;outline:none;font-family:var(--font)"
              onchange="APP.setHistFilter(this.value)">
        <option value="">Todos los pacientes</option>
        ${pts.map(p=>`<option value="${p.cama}" ${filterCama===p.cama?'selected':''}>${p.nombre||'Cama '+p.cama} — Cama ${p.cama}</option>`).join('')}
      </select>
      <span style="font-size:12px;color:var(--tx-muted)">${allEntries.length} registro${allEntries.length!==1?'s':''}</span>
    </div>
    <div class="hist-list">
      ${allEntries.map((e,i)=>renderHistCard(e,i,filterCama)).join('')}
    </div>`;
}

function renderHistCard(e,idx,filterCama){
  const icon=e.tipo==='DIA'?'☀':'🌙';
  const label=e.esActual?`Turno en curso (${e.tipo==='DIA'?'Día':'Noche'})`:(e.tipo==='DIA'?'Turno Día':'Turno Noche');
  const alertas=e.pacientes.filter(p=>p.estado==='alerta').length;
  const crit=e.pacientes.reduce((a,p)=>a+(p.examenes_criticos||[]).length,0);
  const pacs=filterCama?e.pacientes.filter(p=>p.cama===filterCama):e.pacientes;
  return`
    <div class="hist-card">
      <div class="hist-hdr" id="hh-${idx}" onclick="APP.toggleHist(${idx})">
        <div class="hist-icon">${icon}</div>
        <div class="hist-info">
          <div class="hist-title">${e.esActual?'⬤ ':''}<strong>${label}</strong> — ${e.fecha} — ${e.profesional}${e.rol?' ('+e.rol+')':''}</div>
          <div class="hist-sub">${e.hora_inicio} → ${e.hora_cierre} · ${e.pacientes.length} paciente${e.pacientes.length!==1?'s':''}</div>
        </div>
        <div class="hist-stats">
          ${e.esActual?`<span class="hist-stat" style="background:var(--b-bg);color:var(--b-tx)">En curso</span>`:''}
          ${alertas?`<span class="hist-stat" style="background:var(--r-bg);color:var(--r-tx)">${alertas} alerta${alertas>1?'s':''}</span>`:''}
          ${crit?`<span class="hist-stat" style="background:var(--r-bg);color:var(--r-tx)">⚠ ${crit} crítico${crit>1?'s':''}</span>`:''}
          ${e.incidente?`<span class="hist-stat" style="background:var(--r-bg);color:var(--r-tx)">⚑ Incidente</span>`:''}
        </div>
        <span class="hist-chevron">›</span>
      </div>
      <div class="hist-body" id="hb-${idx}">
        ${e.obs_generales?`<div style="background:var(--b-bg);border:1px solid var(--b-bd);border-radius:8px;padding:10px 12px;margin-bottom:12px">
          <div style="font-size:11px;font-weight:600;color:var(--b-tx);margin-bottom:4px">Observaciones generales</div>
          <div style="font-size:13px;color:var(--b-tx)">${esc(e.obs_generales)}</div>
        </div>`:''}
        ${e.incidente?`<div style="background:var(--r-bg);border:1px solid var(--r-bd);border-radius:8px;padding:10px 12px;margin-bottom:12px">
          <div style="font-size:11px;font-weight:600;color:var(--r-tx);margin-bottom:4px">⚑ Incidente reportado</div>
          <div style="font-size:13px;color:var(--r-tx)">${esc(e.incidente)}</div>
        </div>`:''}
        ${!pacs.length?`<div class="empty-st"><p>Sin datos para la cama seleccionada en este registro.</p></div>`:''}
        ${pacs.map(renderSnapCard).join('')}
      </div>
    </div>`;
}

function renderSnapCard(p){
  const SC={ok:'var(--g)',alerta:'var(--r)',obs:'var(--a)',libre:'#94A3B8'};
  const SL={ok:'Estable',alerta:'Alerta',obs:'Observación',libre:'Libre'};
  return`<div class="snap-card">
    <div class="snap-hdr">
      <span class="snap-cama">Cama ${p.cama}</span>
      <span class="snap-name">${p.nombre}</span>
      <span class="snap-estado" style="background:${SC[p.estado]||'#6B7280'}22;color:${SC[p.estado]||'#6B7280'}">${SL[p.estado]||p.estado}</span>
    </div>
    <div class="snap-dx">${p.dx||''}${p.dias!==null?` · Día ${p.dias} de hospitalización`:''}</div>
    ${(p.evoluciones_turno||[]).length?`
      <div class="snap-sec">Evoluciones del turno (${p.evoluciones_turno.length})</div>
      ${p.evoluciones_turno.slice(0,2).map(e=>`
        <div style="background:#F8FAFC;border:1px solid var(--card-border);border-radius:6px;padding:8px;margin-bottom:5px;font-size:12px">
          <span style="color:var(--tx-muted)">${e.fecha} — ${e.autor}</span>
          <div style="margin-top:4px;white-space:pre-wrap;color:var(--tx-primary)">${esc(e.texto.substring(0,200))}${e.texto.length>200?'...':''}</div>
        </div>`).join('')}`:`<div class="snap-sec" style="color:var(--r)">Sin evoluciones en este turno</div>`}
    ${(p.procs_realizados||[]).length?`
      <div class="snap-sec">Procedimientos realizados</div>
      ${p.procs_realizados.map(pr=>`<div class="snap-line done">✓ ${pr.nombre}</div>`).join('')}`:'' }
    ${(p.procs_pendientes||[]).length?`
      <div class="snap-sec" style="color:var(--a)">Pendientes para siguiente turno</div>
      ${p.procs_pendientes.map(pr=>`<div class="snap-line pend">◷ ${pr.nombre}</div>`).join('')}`:'' }
    ${(p.examenes_criticos||[]).length?`
      <div class="snap-sec" style="color:var(--r)">⚠ Exámenes críticos</div>
      ${p.examenes_criticos.map(e=>`<div class="snap-line crit">! ${e.tipo}: ${e.resultado}</div>`).join('')}`:'' }
    ${(p.otros_pendientes||[]).length?`
      <div class="snap-sec">Otros pendientes</div>
      ${p.otros_pendientes.map(pd=>`<div class="snap-line" style="color:var(--a-tx)">• ${esc(pd.texto||pd)}</div>`).join('')}`:'' }
  </div>`;
}

/* ═══════════════════════════════════════════ PATIENT MODAL */
function renderPatientModal(p){
  const libre=p.estado==='libre';
  const SL={ok:'Estable',alerta:'Alerta',obs:'Observación',libre:'Disponible'};
  const SC={ok:'var(--g)',alerta:'var(--r)',obs:'var(--a)',libre:'var(--gr)'};
  const tabs=libre
    ?[['datos','Datos']]
    :[['datos','Datos'],['ingreso','Ingreso'],['evoluciones','Evoluciones'],
      ['examenes','Exámenes'],['procedimientos','Procedimientos'],['pendientes','Pendientes']];
  return`

      <div class="modal-hdr-main">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <div class="modal-htitle">Cama ${p.cama}${p.nombre?' — '+p.nombre:' — Disponible'}</div>
          <span style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;
            background:${SC[p.estado]||'#94A3B8'}22;color:${SC[p.estado]||'#94A3B8'}">${SL[p.estado]||p.estado}</span>
          ${p.alergias?`<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:#FDF4FF;color:#7E22CE;border:1px solid #E9D5FF">⚠ ${esc(p.alergias)}</span>`:''}

      </div>
      <button class="modal-close" onclick="APP.closeModal()">✕</button>
    </div>
    <div class="modal-tabs">
      ${tabs.map(([id,label],i)=>`<div class="modal-tab${i===0?' active':''}" data-tab="${id}" onclick="APP.switchTab('${id}')">${label}</div>`).join('')}
    </div>
    <div class="modal-body">
      ${renderTabDatos(p)}

      ${!libre?renderTabEvoluciones(p):''}

    <textarea id="sd-obs" class="dialog-input" style="min-height:68px;margin-bottom:12px" placeholder="Resumen del turno, novedades importantes..."></textarea>
    <label style="font-size:12px;font-weight:600;color:var(--tx-mid);display:block;margin-bottom:5px">Incidentes (opcional)</label>
    <input type="text" id="sd-inc" class="dialog-input" placeholder="Dejar vacío si no hubo incidentes">
    <div class="dialog-actions">
      <button class="btn-pri btn-sec" onclick="APP.closeDialog()">Cancelar</button>
      <button class="btn-pri" onclick="APP._confirmShiftClose()">Cerrar turno y guardar</button>
    </div>`;
  APP._confirmShiftClose=()=>{
    const obs=document.getElementById('sd-obs').value;
    const inc=document.getElementById('sd-inc').value;
    APP.closeDialog();
    onOk(obs,inc);
  };
  document.getElementById('dialog-overlay').classList.remove('hidden');
}

/* ══════════════════════════════════════════════ PRINT */
function renderPrint(){
  const cfg=getCfg();
  const user=getUser()||{name:'--',role:'--'};
  const pts=getPatients().filter(p=>p.estado!=='libre');
  const now=new Date();
  return`
    <style>body{font-size:11px;font-family:Arial,sans-serif;color:#000}</style>
    <div style="padding:20px">
      <div style="display:flex;justify-content:space-between;border-bottom:2px solid #1B3A5C;padding-bottom:8px;margin-bottom:14px">
        <div>
          <div style="font-size:16px;font-weight:bold;color:#1B3A5C">Trazabilidad de Enfermería</div>
          <div>${HOSPITAL_ZONES.find(z=>z.id===cfg.zoneId)?.name||'Todas las zonas'}</div>
          <div>Turno: ${cfg.currentShift==='DIA'?'Día 08:00–20:00':'Noche 20:00–08:00'}</div>
          <div>Profesional: ${user.name} · ${user.role}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:16px;font-weight:bold">${fmtDate(now)}</div>
          <div>${fmtTime(now)}</div>
        </div>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:10px">
        <thead><tr style="background:#EEF2F7">
          <th style="border:1px solid #CBD5E1;padding:6px;text-align:left">Cama</th>
          <th style="border:1px solid #CBD5E1;padding:6px">Paciente</th>
          <th style="border:1px solid #CBD5E1;padding:6px">Diagnóstico</th>
          <th style="border:1px solid #CBD5E1;padding:6px">Estado</th>
          <th style="border:1px solid #CBD5E1;padding:6px">Días</th>
          <th style="border:1px solid #CBD5E1;padding:6px">Evolución hoy</th>
          <th style="border:1px solid #CBD5E1;padding:6px">Pendientes</th>
        </tr></thead>
        <tbody>
          ${pts.map(p=>{
            const days=p.ingreso_datetime?Math.floor((Date.now()-new Date(p.ingreso_datetime))/86400000):'--';
            const ev=(p.evoluciones||[]).find(e=>isToday(e.fechaRaw));
            const pend=[...(p.procedimientos||[]).filter(x=>!x.done).map(x=>x.nombre),(p.pendientes||[]).map(x=>x.texto)].flat();
            return`<tr>
              <td style="border:1px solid #CBD5E1;padding:5px;font-weight:bold">${p.cama}</td>
              <td style="border:1px solid #CBD5E1;padding:5px">${p.nombre}<br><small style="color:#64748B">${p.rut} · ${p.edad}a</small></td>
              <td style="border:1px solid #CBD5E1;padding:5px">${p.dx}</td>
              <td style="border:1px solid #CBD5E1;padding:5px">${{ok:'Estable',alerta:'ALERTA',obs:'Observ.'}[p.estado]||p.estado}</td>
              <td style="border:1px solid #CBD5E1;padding:5px;text-align:center">${days}</td>
              <td style="border:1px solid #CBD5E1;padding:5px;max-width:180px">${ev?ev.texto.substring(0,120)+'...':'— Sin evolución —'}</td>
              <td style="border:1px solid #CBD5E1;padding:5px">${pend.slice(0,3).join(', ')}</td>
            </tr>`;}).join('')}
        </tbody>
      </table>
      <div style="margin-top:16px;font-size:9px;color:#94A3B8;border-top:1px solid #E2E8F0;padding-top:8px">
        Impreso: ${fmtDT(now)} · Sistema de Trazabilidad de Enfermería
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════════ TOAST */
function toast(msg,type='ok'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className=`toast ${type==='error'?'error':type==='warn'?'warn':''}`;
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),350); },3200);
}

/* ══════════════════════════════════════════════════ UTILS */
function esc(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ═══════════════════════════════════════════════════════════
   TRAZABILIDAD DE ENFERMERÍA — app.js v2
   Lógica principal corregida completamente
═══════════════════════════════════════════════════════════ */

const APP = {
  view:        'camas',
  filter:      'todos',
  histFilter:  '',
  zoneId:      'all',
  _timerIv:    null,
  _clockIv:    null,
  _confirmShiftClose: null,

  /* ══════════════════════════════════════════════════ BOOT */
  init() {
    initData();
    this.zoneId = getCfg().zoneId || 'all';
    this.startClock();
    const user = getUser();
    if (!user) { renderLogin(); return; }
    this.boot();
  },

  boot() {
    document.getElementById('login-screen').classList.add('hidden');
    this.updateTopbar();
    this.render();
    this.startTimers();
    this.bindEvents();
    window.addEventListener('resize', () => { if (window.innerWidth > 1100) this.closeSidebar(); });
  },

  /* ══════════════════════════════════════════════════ LOGIN */
  doLogin() {
    const name = (document.getElementById('li-name')?.value || '').trim();
    const role = document.getElementById('li-role')?.value || ROLES[0];
    const zone = document.getElementById('li-zone')?.value || HOSPITAL_ZONES[1]?.id || 'all';
    if (!name) { alert('Por favor ingresa tu nombre completo.'); return; }
    const user = { name, role, zone };
    setUser(user);
    const cfg = getCfg();
    cfg.currentShift = detectShift();
    cfg.shiftStart   = fmtTime(new Date());
    cfg.zoneId       = zone;
    saveCfg(cfg);
    this.zoneId = zone;
    this.boot();
  },

  logout() {
    if (!confirm('¿Cerrar sesión? Se perderá el acceso hasta que vuelvas a ingresar.')) return;
    clearUser();
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('sidebar').innerHTML   = '';
    document.getElementById('main-content').innerHTML = '';
    renderLogin();
  },

  /* ══════════════════════════════════════════════ TOPBAR */
  updateTopbar() {
    const cfg  = getCfg();
    const user = getUser() || { name: '--', role: '--' };
    const btn  = document.getElementById('shift-btn');
    const icon = document.getElementById('shift-icon');
    const lbl  = document.getElementById('shift-label');
    const chip = document.getElementById('user-chip-name');
    const crole= document.getElementById('user-chip-role');
    const svc  = document.getElementById('service-name-display');

    if (cfg.currentShift === 'DIA') {
      icon.textContent = '☀'; lbl.textContent  = 'Turno Día  08:00 – 20:00';
      btn.classList.remove('noche');
    } else {
      icon.textContent = '🌙'; lbl.textContent = 'Turno Noche  20:00 – 08:00';
      btn.classList.add('noche');
    }
    if (chip)  chip.textContent  = user.name;
    if (crole) crole.textContent = user.role;
    const zone = HOSPITAL_ZONES.find(z => z.id === (cfg.zoneId || 'all'));
    if (svc)   svc.textContent   = zone ? zone.name : 'Todas las zonas';
  },

  /* ══════════════════════════════════════════════════ CLOCK */
  startClock() {
    const tick = () => {
      const now = new Date();
      const cl = document.getElementById('clock');
      const dl = document.getElementById('date-display');
      if (cl) cl.textContent = now.toLocaleTimeString('es-CL');
      if (dl) dl.textContent = now.toLocaleDateString('es-CL', { weekday:'short', day:'numeric', month:'short' });
    };
    tick();
    if (this._clockIv) clearInterval(this._clockIv);
    this._clockIv = setInterval(tick, 1000);
  },

  /* ══════════════════════════════════════════════════ TIMERS */
  startTimers() {
    if (this._timerIv) clearInterval(this._timerIv);
    this._timerIv = setInterval(() => {
      document.querySelectorAll('.timer-val').forEach(el => {
        const iso = el.dataset.iso;
        if (iso) el.textContent = calcElapsed(iso) || '--';
      });
    }, 60000);
  },

  /* ══════════════════════════════════════════════════ RENDER */
  render() {
    this.renderSidebar();
    this.renderMain();
    this.updateTopbar();
  },

  renderSidebar() {
    document.getElementById('sidebar').innerHTML =
      renderSidebar(this.view, this.filter, this.zoneId);
  },

  renderMain() {
    const m = document.getElementById('main-content');
    switch (this.view) {
      case 'camas':       m.innerHTML = renderBedsView(this.filter, this.zoneId); break;
      case 'pendientes':  m.innerHTML = renderPendientesView(); break;
      case 'evoluciones': m.innerHTML = renderEvolucionesView(); break;
      case 'historico':   m.innerHTML = renderHistoricoView(this.histFilter); break;
    }
  },

  /* ══════════════════════════════════════════════════ VIEWS */
  setView(v) {
    this.view = v;
    this.filter = 'todos';
    this.closeSidebar();
    this.render();
  },

  setFilter(f) {
    this.filter = f;
    if (this.view !== 'camas') this.view = 'camas';
    this.renderSidebar();
    this.renderMain();
  },

  setZone(zoneId) {
    this.zoneId = zoneId;
    const cfg = getCfg(); cfg.zoneId = zoneId; saveCfg(cfg);
    this.updateTopbar();
    this.renderMain();
  },

  setHistFilter(cama) {
    this.histFilter = cama;
    this.renderMain();
  },

  /* ══════════════════════════════════════════ PATIENT MODAL */
  openPatient(cama) {
    const p = getPatientByCama(cama) || emptyPatient(cama);
    document.getElementById('modal-content').innerHTML = renderPatientModal(p);
    document.getElementById('modal-overlay').classList.remove('hidden');
  },

  closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
  },

  reopenTab(cama, tabId) {
    this.openPatient(cama);
    // Wait for DOM then switch tab
    requestAnimationFrame(() => this.switchTab(tabId || 'datos'));
  },

  switchTab(tabId) {
    document.querySelectorAll('.modal-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.tab === tabId));
    document.querySelectorAll('.tab-panel').forEach(p =>
      p.classList.toggle('active', p.id === 'tp-' + tabId));
  },

  /* ══════════════════════════════════════════════ SAVE PATIENT
     Usa IDs únicos f-{field}-{cama} para lectura confiable     */
  savePatient(cama) {
    const p = getPatientByCama(cama) || emptyPatient(cama);
    const fields = ['nombre','rut','edad','fechaNac','dx','medico','prevision',
                    'alergias','estado','ingreso_datetime','motivo',
                    'antecedentes','medicacion_previa'];
    fields.forEach(field => {
      const el = document.getElementById(`f-${field}-${cama}`);
      if (!el) return;
      if (el.tagName === 'SELECT')       p[field] = el.value;
      else if (el.type === 'number')     p[field] = el.value ? Number(el.value) : null;
      else if (el.type === 'datetime-local') p[field] = el.value ? new Date(el.value).toISOString() : null;
      else                               p[field] = el.value.trim();
    });
    // Auto-activar cama al asignar paciente
    if (p.estado === 'libre' && p.nombre) p.estado = 'ok';
    updatePatient(p);
    this.render();
    this.reopenTab(cama, 'datos');
    toast('Guardado correctamente ✓');
  },

  /* ══════════════════════════════════════════════ ALTA */
  dischargePatient(cama) {
    if (!confirm(`¿Confirmar alta del paciente de la cama ${cama}?`)) return;
    const fresh = emptyPatient(cama);
    updatePatient(fresh);
    this.closeModal();
    this.render();
    toast(`Cama ${cama} liberada`);
  },

  /* ══════════════════════════════════════════ EVOLUCIONES */
  showEvolForm(cama) {
    const f = document.getElementById(`ef-${cama}`);
    if (f) { f.style.display = 'block'; document.getElementById(`et-${cama}`)?.focus(); }
  },

  setFmt(btn, fmt, cama) {
    btn.closest('.fmt-toggle').querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const ta = document.getElementById(`et-${cama}`);
    if (!ta) return;
    if (fmt === 'SOAP') {
      ta.value = 'S: (Subjetivo — qué refiere el paciente)\n\nO: (Objetivo — signos vitales, hallazgos)\n\nA: (Análisis — evaluación clínica)\n\nP: (Plan — intervenciones y próximos pasos)';
      ta.focus();
    } else {
      if (ta.value.startsWith('S:')) ta.value = '';
    }
  },

  saveEvol(cama) {
    const ta = document.getElementById(`et-${cama}`);
    const text = ta ? ta.value.trim() : '';
    if (!text) { toast('Escriba el texto de la evolución', 'warn'); return; }
    const cfg  = getCfg();
    const user = getUser() || { name: 'Profesional', role: '' };
    const now  = new Date();
    const evol = {
      id: uid(), fechaRaw: now.toISOString(),
      turno: cfg.currentShift, fecha: fmtDT(now),
      formato: 'narrativo', texto: text,
      autor: `${user.name}${user.role ? ' · ' + user.role : ''}`
    };
    const p = getPatientByCama(cama);
    if (!p) return;
    p.evoluciones = [evol, ...(p.evoluciones || [])];
    updatePatient(p);
    this.render();
    this.reopenTab(cama, 'evoluciones');
    toast('Evolución guardada ✓');
  },

  delEvol(cama, id) {
    if (!confirm('¿Eliminar esta evolución?')) return;
    const p = getPatientByCama(cama); if (!p) return;
    p.evoluciones = (p.evoluciones || []).filter(e => e.id !== id);
    updatePatient(p);
    this.render();
    this.reopenTab(cama, 'evoluciones');
    toast('Evolución eliminada', 'warn');
  },

  /* ══════════════════════════════════════════════ EXÁMENES */
  addExam(cama) {
    const tipo = prompt('Tipo de examen:'); if (!tipo) return;
    const resultado = prompt('Resultado:') || 'Pendiente resultado';
    const estado = prompt('Estado:\n  pendiente\n  resultado\n  critico', 'resultado') || 'resultado';
    const validEstados = ['pendiente','resultado','critico'];
    const p = getPatientByCama(cama); if (!p) return;
    p.examenes = [{ id: uid(), tipo, resultado, fecha: fmtDate(new Date()),
      estado: validEstados.includes(estado) ? estado : 'pendiente' },
      ...(p.examenes || [])];
    updatePatient(p);
    this.render();
    this.reopenTab(cama, 'examenes');
    toast('Examen agregado');
  },

  delExam(cama, id) {
    const p = getPatientByCama(cama); if (!p) return;
    p.examenes = (p.examenes || []).filter(e => e.id !== id);
    updatePatient(p);
    this.render();
    this.reopenTab(cama, 'examenes');
  },

  /* ══════════════════════════════════════════ PROCEDIMIENTOS */
  addProc(cama) {
    const nombre = prompt('Nombre del procedimiento:'); if (!nombre) return;
    const indicadoPor = prompt('Indicado por:', 'Médico tratante') || '';
    const p = getPatientByCama(cama); if (!p) return;
    p.procedimientos = [...(p.procedimientos || []),
      { id: uid(), nombre, indicadoPor, fecha: fmtDate(new Date()), done: false, hora: '' }];
    updatePatient(p);
    this.render();
    this.reopenTab(cama, 'procedimientos');
    toast('Procedimiento agregado');
  },

  toggleProc(cama, id) {
    const p = getPatientByCama(cama); if (!p) return;
    const pr = (p.procedimientos || []).find(x => x.id === id); if (!pr) return;
    pr.done = !pr.done;
    pr.hora = pr.done ? fmtTime(new Date()) : '';
    updatePatient(p);
    // Si estamos en vista global de pendientes, solo re-render main
    if (this.view === 'pendientes') { this.renderMain(); return; }
    this.render();
    this.reopenTab(cama, 'procedimientos');
  },

  delProc(cama, id) {
    const p = getPatientByCama(cama); if (!p) return;
    p.procedimientos = (p.procedimientos || []).filter(x => x.id !== id);
    updatePatient(p);
    this.render();
    this.reopenTab(cama, 'procedimientos');
  },

  /* ══════════════════════════════════════════════ PENDIENTES */
  addPend(cama) {
    const texto = prompt('Descripción del pendiente:'); if (!texto) return;
    const p = getPatientByCama(cama); if (!p) return;
    p.pendientes = [...(p.pendientes || []), { id: uid(), texto }];
    updatePatient(p);
    this.render();
    this.reopenTab(cama, 'pendientes');
    toast('Pendiente agregado');
  },

  delPend(cama, id) {
    const p = getPatientByCama(cama); if (!p) return;
    p.pendientes = (p.pendientes || []).filter(x => x.id !== id);
    updatePatient(p);
    this.render();
    this.reopenTab(cama, 'pendientes');
  },

  /* ══════════════════════════════════════════════ TURNO
     Cambio manual con confirmación + snapshot automático.
     El sistema NO cambia turno automáticamente — requiere
     acción explícita de la enfermera al inicio de su turno.  */
  toggleShift() {
    renderShiftDialog((obs, inc) => {
      const cfg  = getCfg();
      const user = getUser() || { name: 'Sistema', role: '' };
      const snap = buildSnapshot(user, cfg.currentShift, cfg.shiftStart, obs, inc);
      addHistory(snap);
      cfg.currentShift = cfg.currentShift === 'DIA' ? 'NOCHE' : 'DIA';
      cfg.shiftStart   = fmtTime(new Date());
      saveCfg(cfg);
      this.render();
      toast(`Turno cerrado. Iniciando ${cfg.currentShift === 'DIA' ? 'Turno Día' : 'Turno Noche'}`);
    });
  },

  closeShift() { this.toggleShift(); },

  /* ══════════════════════════════════════════════ HISTORIAL */
  toggleHist(idx) {
    const body = document.getElementById(`hb-${idx}`);
    const hdr  = document.getElementById(`hh-${idx}`);
    if (!body) return;
    const open = body.classList.contains('show');
    body.classList.toggle('show', !open);
    hdr && hdr.classList.toggle('open', !open);
  },

  viewLastShift() {
    this.view = 'historico';
    this.render();
    setTimeout(() => this.toggleHist(0), 120);
  },

  /* ══════════════════════════════════════════════ SIDEBAR MOBILE */
  toggleSidebar() {
    const s = document.getElementById('sidebar');
    const o = document.getElementById('sidebar-overlay');
    if (s.classList.contains('open')) this.closeSidebar();
    else { s.classList.add('open'); o.classList.add('vis'); }
  },

  closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('vis');
  },

  /* ══════════════════════════════════════════════ SEARCH */
  handleSearch(q) {
    if (!q.trim()) { this.renderMain(); return; }
    const ql = q.toLowerCase();
    const pts = getPatients().filter(p =>
      p.nombre.toLowerCase().includes(ql) ||
      p.rut.includes(ql) ||
      p.cama.includes(ql) ||
      (p.dx || '').toLowerCase().includes(ql)
    );
    document.getElementById('main-content').innerHTML = `
      <div class="view-hdr">
        <div><div class="view-title">Búsqueda: "${q}"</div>
        <div class="view-sub">${pts.length} resultado${pts.length !== 1 ? 's' : ''}</div></div>
      </div>
      <div class="beds-grid">${pts.map(renderBedCard).join('') ||
        '<div class="empty-st"><p>Sin resultados</p></div>'}</div>`;
  },

  /* ══════════════════════════════════════════ EXPORT / IMPORT */
  exportData() {
    const data = { patients: getPatients(), history: getHistory(),
                   config: getCfg(), at: new Date().toISOString() };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
    a.download = `trazabilidad_${fmtDate(new Date()).replace(/\//g, '-')}.json`;
    a.click();
    toast('Datos exportados');
  },

  importData() { document.getElementById('import-file').click(); },

  handleImport(file) {
    if (!file) return;
    const r = new FileReader();
    r.onload = (e) => {
      try {
        const d = JSON.parse(e.target.result);
        if (d.patients) savePatients(d.patients);
        if (d.history)  saveHistory(d.history);
        if (d.config)   saveCfg({ ...getCfg(), ...d.config });
        this.zoneId = getCfg().zoneId || 'all';
        this.render();
        toast('Datos importados correctamente');
      } catch { toast('Archivo inválido', 'error'); }
    };
    r.readAsText(file);
  },

  /* ══════════════════════════════════════════════════ PRINT */
  printShift() {
    const tpl = document.getElementById('print-template');
    tpl.innerHTML = renderPrint();
    tpl.style.display = 'block';
    window.print();
    tpl.style.display = 'none';
    tpl.innerHTML = '';
  },

  /* ══════════════════════════════════════════════ DIALOG */
  closeDialog() {
    document.getElementById('dialog-overlay').classList.add('hidden');
  },

  /* ══════════════════════════════════════════════ EVENTS
     Todos los eventos van aquí. El modal NO usa event delegation
     para evitar el bug donde el select no se puede clickear.    */
  bindEvents() {
    // Search
    let st;
    document.getElementById('search-input')?.addEventListener('input', e => {
      clearTimeout(st); st = setTimeout(() => this.handleSearch(e.target.value), 280);
    });

    // Import file
    document.getElementById('import-file')?.addEventListener('change', e => {
      this.handleImport(e.target.files[0]); e.target.value = '';
    });

    // ESC cierra modal
    document.addEventListener('keydown', e => { if (e.key === 'Escape') this.closeModal(); });

    // Modal backdrop click (solo el overlay, no el container)
    document.getElementById('modal-overlay')?.addEventListener('click', e => {
      if (e.target === document.getElementById('modal-overlay')) this.closeModal();
    });

    // Overlay del sidebar mobile
    document.getElementById('sidebar-overlay')?.addEventListener('click', () => this.closeSidebar());

    // Topbar buttons via data-action (solo los del topbar, NO el modal)
    document.getElementById('topbar')?.addEventListener('click', e => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      switch (el.dataset.action) {
        case 'toggle-shift':  this.toggleShift(); break;
        case 'export-data':   this.exportData(); break;
        case 'import-data':   this.importData(); break;
        case 'print-shift':   this.printShift(); break;
      }
    });
  },
};
